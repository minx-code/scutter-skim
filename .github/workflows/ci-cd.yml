name: CI/CD Pipeline

on:
    push:
        branches: ['main']
        tags:
            - 'v*.*.*'
    pull_request:
        branches: ['main']

jobs:
    validate-and-test:
        name: Validate & Test
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4

            - name: Check manifest.json syntax
              run: jq empty manifest.json

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '20'

            - name: Run Unit Tests
              run: npm test

    build-and-release:
        name: Build & Release
        needs: validate-and-test
        runs-on: ubuntu-latest
        permissions:
            contents: write
        steps:
            - uses: actions/checkout@v4

            - name: Update version from tag
              if: startsWith(github.ref, 'refs/tags/v')
              run: |
                VERSION="${GITHUB_REF_NAME#v}"
                jq --arg v "$VERSION" '.version = $v' manifest.json > manifest.tmp.json && mv manifest.tmp.json manifest.json
                jq --arg v "$VERSION" '.version = $v' package.json > package.tmp.json && mv package.tmp.json package.json

            - name: Make build script executable
              run: chmod +x scripts/build.sh

            - name: Run Build Script
              run: ./scripts/build.sh

            - name: Upload Build Artifact
              uses: actions/upload-artifact@v4
              with:
                  name: scutter-skim-extension
                  path: dist/extension.zip

            - name: Create GitHub Release
              if: startsWith(github.ref, 'refs/tags/v')
              uses: softprops/action-gh-release@v2
              with:
                  files: dist/extension.zip
              env:
                  GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
